id: system.runtime
kind: system
version: 1
status: current
summary: Rust stable toolchain 与 egui 0.33.3 运行约束
toolchain:
  rust: stable
  cargo_resolver: "2"
  desktop_shell: eframe
dependencies:
  egui: 0.33.3
  eframe: 0.33.3
  rustybuzz: 0.20.1
  ttf-parser: 0.25.1
  fontdb: 0.23.0
  unicode-segmentation: 1.13.2
  unicode-bidi: 0.3.18
  unicode-linebreak: 0.1.5
  unicode-script: 0.5.7
  icu_locale: 2.1.1
  icu_segmenter: 2.1.2
  resvg: 0.47.0
  tiny-skia: 0.12.0
  image: 0.25.10
  lru: 0.16.3
  ahash: 0.8.12
  serde: 1.0.228
  serde_json: 1.0.149
  parking_lot: 0.12.5
  pulldown-cmark: 0.13.0
ci:
  os: ubuntu-latest
  formatter: cargo fmt --all --check
  tests: cargo test --all
  linux_gui_packages:
    - libasound2-dev
    - libgl1-mesa-dev
    - libudev-dev
    - libwayland-dev
    - libx11-dev
    - libx11-xcb-dev
    - libxcb-render0-dev
    - libxcb-shape0-dev
    - libxcb-xfixes0-dev
    - libxkbcommon-dev
constraints:
  egui_version_pin: "0.33.3"
  eframe_version_pin: "0.33.3"
  dependency_location: root-Cargo.toml
  profile_policy: dev-profile-optimizes-layout-and-render-crates
invariants:
  - keep_gui_versions_pinned
  - keep_workspace_dependencies_centralized
  - prefer_stable_rust_ci
semantics:
  keep_gui_versions_pinned: egui and eframe stay at 0.33.3 unless a migration is explicitly requested
  keep_workspace_dependencies_centralized: shared dependency versions are declared in root Cargo.toml
  prefer_stable_rust_ci: CI uses the stable Rust toolchain for formatting and tests
relations:
  depends_on:
    - system.workspace
  extends: []
  constrains: []
